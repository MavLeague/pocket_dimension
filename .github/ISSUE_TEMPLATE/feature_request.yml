name: Feature Request
description: Suggest a new idea or enhancement for the Pocket Dimension mod.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in improving the Pocket Dimension mod!
        Please fill out the fields below to propose your idea.
  - type: textarea
    id: problem
    attributes:
      label: Related Problem
      description: Is your feature request related to a specific problem or inconvenience?
      placeholder: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or solution you would like to see implemented.
      placeholder: A clear and concise description of what you want to happen and how it should work in-game.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions, items, or mechanics you have considered.
    validations:
      required: false
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or mockups about the feature request here.
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Checks
      options:
        - label: I have searched the existing issues to ensure this feature has not already been requested.
          required: true